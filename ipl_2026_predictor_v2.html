
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0e1a;--surface:#111827;--card:#1a2236;--border:#2a3550;
    --gold:#f5a623;--orange:#e8621a;--blue:#3a6fd8;--green:#22c55e;
    --red:#ef4444;--text:#f1f5f9;--muted:#94a3b8;
  }
  body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text)}
  h1,h2,h3,.score-num,.tab,.match-num,.section-title,.btn,.header-title{font-family:'Rajdhani',sans-serif}
  .app{padding-bottom:50px}
  .header{background:linear-gradient(135deg,#0f172a,#1e1b4b 50%,#0f172a);border-bottom:1px solid var(--border);padding:18px 20px 14px;text-align:center;position:relative;overflow:hidden}
  .header::before{content:'';position:absolute;top:-30px;left:50%;transform:translateX(-50%);width:200px;height:80px;background:radial-gradient(ellipse,rgba(245,166,35,.18),transparent 70%)}
  .header-title{font-size:26px;font-weight:700;letter-spacing:2px;color:var(--gold);line-height:1}
  .header-sub{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:3px}

  .setup-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin:16px}
  .setup-title{font-size:18px;font-weight:700;color:var(--gold);text-align:center;margin-bottom:14px}
  .prow{display:flex;gap:10px;align-items:center;margin-bottom:10px}
  .pavatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;font-family:'Rajdhani',sans-serif}
  .pa1{background:rgba(56,107,216,.25);border:2px solid var(--blue);color:var(--blue)}
  .pa2{background:rgba(245,166,35,.2);border:2px solid var(--gold);color:var(--gold)}
  .pinput{flex:1;background:#0d1526;border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;outline:none;font-family:'DM Sans',sans-serif}
  .pinput:focus{border-color:var(--blue)}

  .btn{border:none;border-radius:8px;padding:11px 20px;font-size:15px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all .15s;width:100%;display:block;text-align:center}
  .btn-gold{background:var(--gold);color:#0a0e1a}
  .btn-gold:hover{background:#f0b84a}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);width:100%;margin-top:10px}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
  .btn-sm{padding:6px 12px;font-size:13px;width:auto;border-radius:6px}
  .btn-outline-sm{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:.5px;cursor:pointer;border-radius:6px;padding:5px 10px}
  .btn-outline-sm:hover{border-color:var(--gold);color:var(--gold)}

  .sync-bar{margin:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px}
  .sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:pulse 2s infinite}
  .sdot.live{background:var(--green)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .stext{font-size:12px;color:var(--muted);flex:1}
  .scode{font-family:monospace;font-size:13px;font-weight:600;color:var(--gold);letter-spacing:2px;background:rgba(245,166,35,.1);padding:3px 8px;border-radius:4px;cursor:pointer}

  .scoreboard{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 14px}
  .sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
  .sc.p1{border-top:3px solid var(--blue)}
  .sc.p2{border-top:3px solid var(--gold)}
  .sc-name{font-size:12px;color:var(--muted);margin-bottom:3px}
  .score-num{font-size:34px;font-weight:700;line-height:1}
  .p1 .score-num{color:var(--blue)}
  .p2 .score-num{color:var(--gold)}
  .sc-lbl{font-size:11px;color:var(--muted);margin-top:1px}

  .tab-bar{display:flex;border-bottom:1px solid var(--border);margin:0 16px 14px;border-radius:10px 10px 0 0;overflow:hidden}
  .tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;letter-spacing:1px;color:var(--muted);cursor:pointer;background:var(--card);border-bottom:2px solid transparent;transition:all .15s}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(245,166,35,.05)}

  .match-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin:0 16px 12px;overflow:hidden}
  .mh{background:rgba(245,166,35,.07);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;justify-content:space-between;align-items:center}
  .match-num{font-size:12px;color:var(--gold);letter-spacing:1px}
  .mdate{font-size:11px;color:var(--muted)}
  .teams-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;padding:12px 14px}
  .tbtn{background:#0d1526;border:2px solid var(--border);border-radius:10px;padding:11px 8px;text-align:center;cursor:pointer;transition:all .18s}
  .tbtn:hover{border-color:var(--gold);background:rgba(245,166,35,.07)}
  .tbtn.sel-p1{border-color:var(--blue);background:rgba(56,107,216,.15)}
  .tbtn.sel-p2{border-color:var(--gold);background:rgba(245,166,35,.12)}
  .tbtn.winner{border-color:var(--green);background:rgba(34,197,94,.1)}
  .tbtn.disabled{cursor:default;opacity:.7}
  .tlogo{font-size:24px;display:block;margin-bottom:3px}
  .tname{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;color:var(--text);line-height:1.2}
  .tshort{font-size:10px;color:var(--muted);margin-top:1px}
  .vs{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--muted);text-align:center}

  .preds-row{padding:9px 14px;border-top:1px solid var(--border);background:#0d1526;display:flex;gap:7px}
  .pchip{flex:1;text-align:center;padding:6px 4px;border-radius:7px;font-size:11px;font-weight:500;border:1px solid transparent;line-height:1.3}
  .pchip.blank{background:rgba(148,163,184,.07);border-color:var(--border);color:var(--muted)}
  .pchip.cp1{background:rgba(56,107,216,.13);border-color:var(--blue);color:#82a8e8}
  .pchip.cp2{background:rgba(245,166,35,.1);border-color:var(--gold);color:var(--gold)}
  .pchip.ok{background:rgba(34,197,94,.13);border-color:var(--green);color:var(--green)}
  .pchip.no{background:rgba(239,68,68,.1);border-color:var(--red);color:var(--red)}

  .result-row{padding:8px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
  .rlbl{font-size:11px;color:var(--muted);flex-shrink:0}
  .rsel{background:#0d1526;border:1px solid var(--border);color:var(--text);font-size:13px;padding:5px 8px;border-radius:6px;flex:1;font-family:'DM Sans',sans-serif}
  .rsel:focus{outline:none;border-color:var(--green)}
  .btn-set{background:var(--green);color:#0a0e1a;border:none;border-radius:6px;padding:6px 12px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.5px}
  .btn-set:hover{background:#1eaa50}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid var(--gold);color:var(--text);padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;display:none;white-space:nowrap}
  .empty{text-align:center;padding:30px 20px;color:var(--muted)}
  .empty-icon{font-size:36px;margin-bottom:8px}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;max-width:320px;width:100%}
  .modal h3{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--gold);margin-bottom:6px}
  .modal p{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:14px}
  .mbtns{display:flex;gap:8px;margin-top:4px}
  .mbtns .btn{flex:1}
  .btn-cancel{background:var(--card);color:var(--muted);border:1px solid var(--border)}
  .minput{width:100%;background:#0d1526;border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:monospace;font-size:20px;letter-spacing:3px;text-align:center;outline:none;margin-bottom:12px}
  .minput:focus{border-color:var(--gold)}
  .bigcode{font-family:monospace;font-size:38px;font-weight:700;color:var(--gold);letter-spacing:6px;background:rgba(245,166,35,.08);border:1px solid var(--gold);border-radius:10px;padding:12px;text-align:center;margin:10px 0 16px}

  .whose-turn{text-align:center;font-size:11px;color:var(--muted);padding:6px 14px;font-style:italic}
  .whose-turn b{color:var(--gold);font-style:normal}

  .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
  .confirm-box{background:var(--surface);border:1px solid var(--gold);border-radius:16px;padding:22px;max-width:300px;width:100%;text-align:center}
  .confirm-box h3{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px}
  .confirm-team{font-size:32px;margin:10px 0 4px}
  .confirm-tname{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--gold);margin-bottom:14px}
  .confirm-btns{display:flex;gap:10px}
  .btn-yes{flex:1;background:var(--gold);color:#0a0e1a;border:none;border-radius:8px;padding:11px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:1px}
  .btn-yes:hover{background:#f0b84a}
  .btn-no{flex:1;background:var(--card);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:11px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;cursor:pointer}
  .btn-no:hover{border-color:var(--red);color:var(--red)}
</style>

<div class="app" id="app">
  <div class="header">
    <div class="header-title">IPL 2026 PREDICTOR</div>
    <div class="header-sub">Predict · Compete · Win</div>
  </div>
  <div id="main"></div>
</div>
<div class="toast" id="toast"></div>
<div id="modals"></div>

<script>
const TEAMS={
  RCB:{n:'Royal Challengers Bengaluru',s:'RCB',l:'🔴'},
  SRH:{n:'Sunrisers Hyderabad',s:'SRH',l:'🟠'},
  MI:{n:'Mumbai Indians',s:'MI',l:'🔵'},
  KKR:{n:'Kolkata Knight Riders',s:'KKR',l:'🟣'},
  RR:{n:'Rajasthan Royals',s:'RR',l:'🩷'},
  CSK:{n:'Chennai Super Kings',s:'CSK',l:'🟡'},
  PBKS:{n:'Punjab Kings',s:'PBKS',l:'🔴'},
  GT:{n:'Gujarat Titans',s:'GT',l:'🩵'},
  LSG:{n:'Lucknow Super Giants',s:'LSG',l:'🟢'},
  DC:{n:'Delhi Capitals',s:'DC',l:'🔵'},
};

const SCH=[
  {id:1,h:'RCB',a:'SRH',date:'28/03 Sat',time:'7:30 PM'},
  {id:2,h:'MI',a:'KKR',date:'29/03 Sun',time:'7:30 PM'},
  {id:3,h:'RR',a:'CSK',date:'30/03 Mon',time:'7:30 PM'},
  {id:4,h:'PBKS',a:'GT',date:'31/03 Tue',time:'7:30 PM'},
  {id:5,h:'LSG',a:'DC',date:'01/04 Wed',time:'7:30 PM'},
  {id:6,h:'KKR',a:'SRH',date:'02/04 Thu',time:'7:30 PM'},
  {id:7,h:'CSK',a:'PBKS',date:'03/04 Fri',time:'7:30 PM'},
  {id:8,h:'DC',a:'MI',date:'04/04 Sat',time:'3:30 PM'},
  {id:9,h:'GT',a:'RR',date:'04/04 Sat',time:'7:30 PM'},
  {id:10,h:'SRH',a:'LSG',date:'05/04 Sun',time:'3:30 PM'},
  {id:11,h:'RCB',a:'CSK',date:'05/04 Sun',time:'7:30 PM'},
  {id:12,h:'KKR',a:'PBKS',date:'06/04 Mon',time:'7:30 PM'},
  {id:13,h:'RR',a:'MI',date:'07/04 Tue',time:'7:30 PM'},
  {id:14,h:'DC',a:'GT',date:'08/04 Wed',time:'7:30 PM'},
  {id:15,h:'KKR',a:'LSG',date:'09/04 Thu',time:'7:30 PM'},
  {id:16,h:'RR',a:'RCB',date:'10/04 Fri',time:'7:30 PM'},
  {id:17,h:'PBKS',a:'SRH',date:'11/04 Sat',time:'3:30 PM'},
  {id:18,h:'CSK',a:'DC',date:'11/04 Sat',time:'7:30 PM'},
  {id:19,h:'LSG',a:'GT',date:'12/04 Sun',time:'3:30 PM'},
  {id:20,h:'MI',a:'RCB',date:'12/04 Sun',time:'7:30 PM'},
];

let S={p1:'',p2:'',room:'',preds:{},results:{},me:null};
let syncT=null;

function genCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c='';for(let i=0;i<6;i++)c+=chars[Math.floor(Math.random()*chars.length)];
  return c;
}

function toast(msg,ms=2200){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',ms);
}

async function save(){
  if(!S.room)return;
  try{
    await window.storage.set('iplv2_'+S.room,JSON.stringify({
      p1:S.p1,p2:S.p2,preds:S.preds,results:S.results
    }),true);
  }catch(e){}
}

async function load(){
  if(!S.room)return;
  try{
    const r=await window.storage.get('iplv2_'+S.room,true);
    if(r&&r.value){
      const d=JSON.parse(r.value);
      S.p1=d.p1||S.p1; S.p2=d.p2||S.p2;
      S.preds=d.preds||{}; S.results=d.results||{};
      render();
    }
  }catch(e){}
}

function startSync(){
  if(syncT)clearInterval(syncT);
  syncT=setInterval(load,4000);
}

function render(){
  document.getElementById('main').innerHTML='';
  if(!S.room){renderSetup();return;}
  renderGame();
}

function renderSetup(){
  document.getElementById('main').innerHTML=`
    <div class="setup-box">
      <div class="setup-title">ENTER PLAYERS</div>
      <div class="prow"><div class="pavatar pa1">1</div><input class="pinput" id="i1" placeholder="Your name" value="${S.p1}"></div>
      <div class="prow" style="margin-bottom:16px"><div class="pavatar pa2">2</div><input class="pinput" id="i2" placeholder="Friend's name" value="${S.p2}"></div>
      <button class="btn btn-gold" onclick="createRoom()">CREATE ROOM</button>
      <button class="btn btn-ghost" onclick="showJoin()">JOIN EXISTING ROOM</button>
    </div>
    <div style="text-align:center;padding:16px 20px;color:var(--muted);font-size:12px;line-height:1.8">
      Create a room → share the code with your friend → they join on their device → predict together!
    </div>`;
}

async function createRoom(){
  const p1=document.getElementById('i1').value.trim();
  const p2=document.getElementById('i2').value.trim();
  if(!p1||!p2){toast('Enter both player names');return;}
  S.p1=p1; S.p2=p2;
  S.room=genCode();
  S.preds={}; S.results={};
  S.me='p1';
  await save();
  render(); startSync();
  showShareModal();
}

function showJoin(){
  const p1=document.getElementById('i1').value.trim();
  if(!p1){toast('Enter your name first');return;}
  S.p1=p1;
  document.getElementById('modals').innerHTML=`
    <div class="overlay">
      <div class="modal">
        <h3>JOIN ROOM</h3>
        <p>Enter the 6-letter room code your friend shared.</p>
        <input class="minput" id="jcode" placeholder="XXXXXX" maxlength="6" oninput="this.value=this.value.toUpperCase()">
        <div class="mbtns">
          <button class="btn btn-cancel" onclick="closeM()">CANCEL</button>
          <button class="btn btn-gold" onclick="joinRoom()">JOIN</button>
        </div>
      </div>
    </div>`;
}

async function joinRoom(){
  const code=document.getElementById('jcode').value.trim().toUpperCase();
  if(code.length<4){toast('Enter a valid room code');return;}
  try{
    const r=await window.storage.get('iplv2_'+code,true);
    if(r&&r.value){
      const d=JSON.parse(r.value);
      S.room=code; S.me='p2';
      S.p1=d.p1; S.p2=d.p2;
      S.preds=d.preds||{}; S.results=d.results||{};
      closeM();
      render(); startSync();
      toast('Joined! You are '+S.p2+' 🎉');
    } else {
      toast('Room not found. Check the code.');
    }
  }catch(e){toast('Could not join. Try again.');}
}

function showShareModal(){
  document.getElementById('modals').innerHTML=`
    <div class="overlay" onclick="if(event.target.classList.contains('overlay'))closeM()">
      <div class="modal">
        <h3>ROOM CREATED!</h3>
        <p>Share this code with <b style="color:var(--text)">${S.p2}</b>. They tap "Join Existing Room" and enter it.</p>
        <div class="bigcode" onclick="copyCode()">${S.room}</div>
        <div style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:14px">Tap code to copy</div>
        <div class="mbtns">
          <button class="btn btn-cancel" onclick="closeM()">CLOSE</button>
          <button class="btn btn-gold" onclick="copyCode()">COPY CODE</button>
        </div>
      </div>
    </div>`;
}

function copyCode(){
  navigator.clipboard.writeText(S.room).then(()=>toast('Code copied! ✓')).catch(()=>toast('Code: '+S.room,4000));
  closeM();
}
function closeM(){document.getElementById('modals').innerHTML='';}

function renderGame(){
  const s1=calcScore('p1'), s2=calcScore('p2');
  document.getElementById('main').innerHTML=`
    <div class="sync-bar">
      <div class="sdot live"></div>
      <div class="stext">Room: <span class="scode" onclick="showCodeAgain()">${S.room}</span> · syncing every 4s</div>
      <button class="btn-outline-sm" onclick="load()">Refresh</button>
    </div>
    <div class="scoreboard">
      <div class="sc p1"><div class="sc-name">${S.p1||'Player 1'}</div><div class="score-num">${s1}</div><div class="sc-lbl">correct picks</div></div>
      <div class="sc p2"><div class="sc-name">${S.p2||'Player 2'}</div><div class="score-num">${s2}</div><div class="sc-lbl">correct picks</div></div>
    </div>
    <div class="tab-bar">
      <div class="tab active" id="t-pred" onclick="switchTab('pred')">PREDICT</div>
      <div class="tab" id="t-res" onclick="switchTab('res')">RESULTS</div>
    </div>
    <div id="tc"></div>`;
  renderPredict();
}

function switchTab(t){
  document.getElementById('t-pred').classList.toggle('active',t==='pred');
  document.getElementById('t-res').classList.toggle('active',t==='res');
  t==='pred'?renderPredict():renderResults();
}

function renderPredict(){
  const tc=document.getElementById('tc');
  let html='';
  SCH.forEach(m=>{
    const h=TEAMS[m.h], a=TEAMS[m.a];
    const pred=S.preds[m.id]||{};
    const result=S.results[m.id];
    const bothPicked=pred.p1&&pred.p2;
    const myPick=S.me?pred[S.me]:null;
    const canPick=S.me&&!myPick&&!result;

    const p1chip=chipHTML('p1',pred.p1,result,S.p1,bothPicked);
    const p2chip=chipHTML('p2',pred.p2,result,S.p2,bothPicked);

    let hClass='tbtn'+(result===m.h?' winner':canPick?'':' disabled');
    let aClass='tbtn'+(result===m.a?' winner':canPick?'':' disabled');
    if(!result&&myPick===m.h) hClass+=' sel-'+(S.me||'');
    if(!result&&myPick===m.a) aClass+=' sel-'+(S.me||'');

    const clickH=canPick?`onclick="askConfirm(${m.id},'${m.h}')"`:result?'':`onclick=""`;
    const clickA=canPick?`onclick="askConfirm(${m.id},'${m.a}')"`:result?'':`onclick=""`;

    let resRow='';
    if(bothPicked&&!result){
      resRow=`<div class="result-row">
        <span class="rlbl">Result:</span>
        <select class="rsel" id="rs${m.id}">
          <option value="">— Winner —</option>
          <option value="${m.h}">${m.h}</option>
          <option value="${m.a}">${m.a}</option>
        </select>
        <button class="btn-set" onclick="setResult(${m.id})">SET</button>
      </div>`;
    }

    const turnLine=canPick?`<div class="whose-turn">Your pick, <b>${S.me==='p1'?S.p1:S.p2}</b> — tap a team</div>`:'';

    html+=`
      <div class="match-card">
        <div class="mh"><span class="match-num">MATCH ${m.id}</span><span class="mdate">${m.date} · ${m.time}</span></div>
        ${turnLine}
        <div class="teams-grid">
          <div class="${hClass}" ${clickH}>
            <span class="tlogo">${h.l}</span>
            <div class="tname">${h.s}</div>
            <div class="tshort">${h.n.split(' ').slice(-1)[0]}</div>
          </div>
          <div class="vs">${result?'🏆':'VS'}</div>
          <div class="${aClass}" ${clickA}>
            <span class="tlogo">${a.l}</span>
            <div class="tname">${a.s}</div>
            <div class="tshort">${a.n.split(' ').slice(-1)[0]}</div>
          </div>
        </div>
        <div class="preds-row">${p1chip}${p2chip}</div>
        ${resRow}
      </div>`;
  });
  tc.innerHTML=html;
}

function chipHTML(player, pick, result, name, bothPicked){
  const label=name||('P'+(player==='p1'?'1':'2'));
  if(!pick) return `<div class="pchip blank">${label}: —</div>`;
  if(result){
    const ok=pick===result;
    return `<div class="pchip ${ok?'ok':'no'}">${label}: ${pick} ${ok?'✓':'✗'}</div>`;
  }
  if(bothPicked) return `<div class="pchip ${player==='p1'?'cp1':'cp2'}">${label}: ${pick} 🔒</div>`;
  return `<div class="pchip ${player==='p1'?'cp1':'cp2'}">${label}: Predicted 🔒</div>`;
}

function askConfirm(matchId, teamId){
  const m=SCH.find(x=>x.id===matchId);
  const team=TEAMS[teamId];
  if(!team||!m)return;
  document.getElementById('modals').innerHTML=`
    <div class="confirm-overlay">
      <div class="confirm-box">
        <h3>CONFIRM PICK</h3>
        <div style="font-size:12px;color:var(--muted);margin-bottom:8px">Match ${m.id} · ${m.date}</div>
        <div class="confirm-team">${team.l}</div>
        <div class="confirm-tname">${team.s}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:16px">${team.n}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:16px">Lock this in as your winner?</div>
        <div class="confirm-btns">
          <button class="btn-no" onclick="closeM()">CHANGE</button>
          <button class="btn-yes" onclick="confirmPick(${matchId},'${teamId}')">YES, LOCK!</button>
        </div>
      </div>
    </div>`;
}

async function confirmPick(matchId, teamId){
  if(!S.me){toast('Not sure which player you are');closeM();return;}
  const pred=S.preds[matchId]||{};
  if(pred[S.me]){toast('Already predicted!');closeM();return;}
  if(S.results[matchId]){toast('Match has a result already');closeM();return;}
  pred[S.me]=teamId;
  S.preds[matchId]=pred;
  closeM();
  await save();
  renderPredict();
  toast('Prediction locked! 🔒');
}

async function setResult(matchId){
  const sel=document.getElementById('rs'+matchId);
  if(!sel||!sel.value){toast('Pick a winner first');return;}
  S.results[matchId]=sel.value;
  await save();
  renderGame();
  toast('Result saved! Points updated ✓');
}

function calcScore(player){
  return Object.keys(S.results).filter(mid=>{
    const p=S.preds[mid];
    return p&&p[player]&&p[player]===S.results[mid];
  }).length;
}

function renderResults(){
  const tc=document.getElementById('tc');
  const done=SCH.filter(m=>S.results[m.id]);
  if(!done.length){
    tc.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div style="font-size:13px;color:var(--muted)">No results yet. Set winners after both players pick.</div></div>';
    return;
  }
  let html='';
  done.forEach(m=>{
    const h=TEAMS[m.h],a=TEAMS[m.a],w=S.results[m.id],wt=TEAMS[w];
    const pred=S.preds[m.id]||{};
    const p1ok=pred.p1===w, p2ok=pred.p2===w;
    html+=`
      <div class="match-card">
        <div class="mh">
          <span class="match-num">MATCH ${m.id} · ${m.date}</span>
          <span style="font-size:12px;color:var(--green);font-family:'Rajdhani',sans-serif;font-weight:600">${wt?wt.s+' WON':''}</span>
        </div>
        <div style="padding:10px 14px;display:flex;align-items:center;gap:8px">
          <span style="font-size:20px">${h.l}</span>
          <span style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600">${h.s}</span>
          <span style="color:var(--muted);flex:1;text-align:center;font-size:11px">vs</span>
          <span style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600">${a.s}</span>
          <span style="font-size:20px">${a.l}</span>
        </div>
        <div class="preds-row">
          <div class="pchip ${p1ok?'ok':'no'}">${S.p1||'P1'}: ${pred.p1||'—'} ${pred.p1?(p1ok?'✓':'✗'):''}</div>
          <div class="pchip ${p2ok?'ok':'no'}">${S.p2||'P2'}: ${pred.p2||'—'} ${pred.p2?(p2ok?'✓':'✗'):''}</div>
        </div>
      </div>`;
  });
  tc.innerHTML=html;
}

function showCodeAgain(){
  document.getElementById('modals').innerHTML=`
    <div class="overlay" onclick="if(event.target.classList.contains('overlay'))closeM()">
      <div class="modal">
        <h3>ROOM CODE</h3>
        <p>Share with <b style="color:var(--text)">${S.p2}</b> to join on their device.</p>
        <div class="bigcode" onclick="copyCode()">${S.room}</div>
        <div class="mbtns">
          <button class="btn btn-cancel" onclick="closeM()">CLOSE</button>
          <button class="btn btn-gold" onclick="copyCode()">COPY CODE</button>
        </div>
      </div>
    </div>`;
}

render();
</script>
